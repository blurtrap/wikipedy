<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#000000">
    <title>Редач - Ваша Хрюкальня</title>
    <link rel="stylesheet" href="style.css?v=oled1">
</head>
<body>
    <div class="container">
        <header>
            <h1>Ваша Хрюкальня</h1>
            <nav>
                <a href="index.html">Хрюкальня</a>
                <a href="#" id="viewLink" style="display: none;">Посмотреть</a>
            </nav>
        </header>

        <div class="content">
            <h2 id="editTitle">Создание нового поста</h2>
            
            <div id="error" class="error" style="display: none;"></div>
            
            <form id="editForm" class="edit-form">
                <div class="form-group">
                    <label for="pageTitle">Название поста:</label>
                    <input type="text" id="pageTitle" required>
                </div>
                
                <div class="form-group">
                    <label for="pageContent">Содержание:</label>
                    <textarea id="pageContent" rows="20" required 
                        placeholder="Напишите текст статьи... 
Используйте [[Название статьи]] для создания ссылок"></textarea>
                </div>
                
                <div class="form-actions">
                    <button type="submit" class="btn-save">Сохранить</button>
                    <a href="index.html" class="btn-cancel">Отмена</a>
                </div>
            </form>

    <script src="script.js?v=oled1"></script>
</body>
</html>
